<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Commands</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
}

header {
    background: linear-gradient(90deg, #5800ff, #3a0070);
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

.search{
text-align:center;
padding:15px;
}

.search input{
width:90%;
max-width:420px;
padding:12px;
border-radius:8px;
border:none;
background:#151515;
color:white;
font-size:16px;
}

.container{
max-width:1100px;
margin:auto;
padding:15px;
}

.category{
margin-top:35px;
}

.category h2 {
    color: #a876ee;
    border-bottom: 2px solid #916ce5;
    padding-bottom: 6px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
margin-top:12px;
}

.card
 {
    background: #111;
    border: 1px solid #a485fb;
    border-radius: 10px;
    padding: 12px;
}

.card:hover
 {
    border-color: #ffffff;
    box-shadow: 0 0 10px rgb(120 0 255 / 40%);
}

.cmd {
    font-weight: bold;
    font-size: 17px;
    color: #bb8bff;
}

.usage{
font-size:13px;
color:#aaa;
margin-top:5px;
}

.desc{
font-size:14px;
margin-top:6px;
}

button {
    margin-top: 8px;
    background: #5438b6;
    border: none;
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover{
    background: #ffffff;
    color: #000000;
}

footer{
text-align:center;
padding:30px;
opacity:.5;
font-size:13px;
}

</style>
</head>

{cat:"💪 Bouncers Only",name:"/welcome off",usage:"/welcome off",desc:"Turns off Welcome Msg's for joining users."},

];

function render(){

const container=document.getElementById("content");
container.innerHTML="";

const grouped={};

commands.forEach(c=>{
if(!grouped[c.cat]) grouped[c.cat]=[];
grouped[c.cat].push(c);
});

for(let cat in grouped){

let section=document.createElement("div");
section.className="category";

section.innerHTML=`<h2>${cat}</h2><div class="grid"></div>`;

let grid=section.querySelector(".grid");

grouped[cat].forEach(cmd=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="cmd">${cmd.name}</div>
<div class="usage">${cmd.usage}</div>
<div class="desc">${cmd.desc}</div>
<button onclick="copy('${cmd.name}')">Copy</button>
`;

grid.appendChild(card);

});

container.appendChild(section);

}

}

render();

document.getElementById("search").addEventListener("keyup",function(){

let val=this.value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
});

});

function copy(cmd){
navigator.clipboard.writeText(cmd);
alert("Copied: "+cmd);
}

</script>
