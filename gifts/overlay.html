<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin:0;
  background:transparent;
  overflow:hidden;
}

#container {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:400px;
  height:400px;
}
</style>
</head>

<body>

<div id="container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

<script>
const LOTTIE_BASE = "https://assets.meetmecdna.com/images/gifts/lottie/";
const AUDIO_BASE = "https://assets.meetmecdna.com/images/gifts/audio/";

let playing = false;
let queue = [];

window.addEventListener("storage", e => {
  if (e.key !== "gift_event") return;

  const gift = JSON.parse(e.newValue);
  queue.push(gift);
  playNext();
});

function playNext() {
  if (playing || queue.length === 0) return;

  playing = true;
  const gift = queue.shift();

  const container = document.getElementById("container");
  container.innerHTML = "";

  // 🎬 animation
  if (gift.anim) {
    const anim = lottie.loadAnimation({
      container,
      renderer: "svg",
      loop: false,
      autoplay: true,
      path: LOTTIE_BASE + gift.anim
    });

    anim.addEventListener("complete", () => {
      playing = false;
      playNext();
    });
  } else {
    setTimeout(() => {
      playing = false;
      playNext();
    }, 2000);
  }

  // 🔊 sound
  if (gift.sound) {
    const audio = new Audio(AUDIO_BASE + gift.sound);
    audio.volume = 1;
    audio.play().catch(()=>{});
  }
}
</script>

</body>
</html>
