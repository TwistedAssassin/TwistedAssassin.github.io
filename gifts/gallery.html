<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gift Controller</title>

<style>
body { background:#0f0f0f; color:#fff; font-family:Arial; }
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
  padding:20px;
}
.card {
  background:#1c1c1c;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}
.card img {
  width:100%;
  height:100px;
  object-fit:contain;
}
</style>
</head>

<body>

<h2 style="text-align:center;">🎁 Gift Controller</h2>
<div class="gallery" id="gallery"></div>

<script>
const IMAGE_BASE = "https://assets.meetmecdna.com/images/gifts/640/";

// 👉 LOAD YOUR CLEAN JSON
fetch("/clean_gifts.json")
.then(r=>r.json())
.then(data => {

  const gallery = document.getElementById("gallery");

  data.items.forEach(gift => {
    const img = gift.details?.image;
    if (!img) return;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${IMAGE_BASE}${img}">
      <div>${gift.name}</div>
    `;

    card.onclick = () => {
      const base = img
        .replace("ic_gift_", "")
        .replace("_v2", "")
        .replace(".png", "");

      const payload = {
        name: gift.name,
        anim: base + ".json",
        sound: base + ".mp3"
      };

      localStorage.setItem("gift_event", JSON.stringify(payload));
    };

    gallery.appendChild(card);
  });

});
</script>

</body>
</html>
